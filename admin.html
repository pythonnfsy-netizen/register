<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ניהול נרשמים - מעיין שמחה</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .admin-card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; }
        .table-brand { background-color: #c71585; color: white; }
        .sibling-tag { background: #e9ecef; padding: 2px 8px; border-radius: 5px; margin: 2px; display: inline-block; font-size: 0.85em; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="admin-card">
        <h2 class="text-center mb-4" style="color: #c71585;">רשימת נרשמים במערכת</h2>
        <div class="table-responsive">
            <table class="table table-hover border">
                <thead class="table-brand">
                    <tr>
                        <th>תאריך רישום</th>
                        <th>שם הסטודנט</th>
                        <th>תעודת זהות</th>
                        <th>אחים רשומים</th>
                        <th>פעולות</th>
                    </tr>
                </thead>
                <tbody id="resultsTable">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBsWV2a4D_jLkT8CDkhuiMIF-iUeAdoxmE",
        authDomain: "registration-system-36ec5.firebaseapp.com",
        projectId: "registration-system-36ec5",
        storageBucket: "registration-system-36ec5.firebasestorage.app",
        messagingSenderId: "417197352828",
        appId: "1:417197352828:web:173fc91810f9efc38226f9",
        databaseURL: "https://registration-system-36ec5-default-rtdb.europe-west1.firebasedatabase.app/" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // משיכת נתונים בזמן אמת
    db.ref('registrations').on('value', (snapshot) => {
        const tableBody = document.getElementById('resultsTable');
        tableBody.innerHTML = '';
        
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(key => {
                const entry = data[key];
                let siblingsHtml = '';
                
                if (entry.siblings && Array.isArray(entry.siblings)) {
                    entry.siblings.forEach(s => {
                        siblingsHtml += `<span class="sibling-tag">${s.name} (${s.id})</span>`;
                    });
                } else {
                    siblingsHtml = '<span class="text-muted">אין אחים</span>';
                }

                const row = `
                    <tr>
                        <td>${entry.submissionTime || 'ללא תאריך'}</td>
                        <td><strong>${entry.studentName}</strong></td>
                        <td>${entry.studentID}</td>
                        <td>${siblingsHtml}</td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deleteEntry('${key}')">מחק</button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        } else {
            tableBody.innerHTML = '<tr><td colspan="5" class="text-center">אין נתונים להצגה</td></tr>';
        }
    });

    // פונקציית מחיקה
    function deleteEntry(key) {
        if (confirm('האם אתה בטוח שברצונך למחוק את הרישום הזה?')) {
            db.ref('registrations/' + key).remove();
        }
    }
</script>
</body>
</html>
