<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול מאובטח - מעיין שמחה</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: system-ui, -apple-system, sans-serif; }
        .admin-card { max-width: 1000px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .login-card { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .brand-header { color: #c71585; font-weight: bold; }
        .table-brand { background-color: #c71585; color: white; }
        .btn-brand { background-color: #c71585; color: white; border: none; }
        .btn-brand:hover { background-color: #a0116b; color: white; }
        .sibling-tag { background: #fce4ec; color: #c71585; padding: 3px 10px; border-radius: 50px; margin: 2px; display: inline-block; font-size: 0.85em; border: 1px solid #f8bbd0; }
    </style>
</head>
<body>

<div id="loginSection" class="container" style="display: none;">
    <div class="login-card text-center">
        <h2 class="brand-header mb-4">כניסת מנהל</h2>
        <div class="mb-3">
            <input type="email" id="email" class="form-control form-control-lg" placeholder="אימייל">
        </div>
        <div class="mb-4">
            <input type="password" id="password" class="form-control form-control-lg" placeholder="סיסמה">
        </div>
        <button onclick="login()" class="btn btn-brand btn-lg w-100 shadow-sm">התחבר למערכת</button>
        <div id="loginError" class="text-danger mt-3 fw-bold"></div>
    </div>
</div>

<div id="adminContent" class="container-fluid" style="display: none;">
    <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="brand-header m-0">רשימת נרשמים - מעיין שמחה</h2>
            <button onclick="logout()" class="btn btn-outline-secondary btn-sm">התנתק מהמערכת</button>
        </div>
        
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-brand">
                    <tr>
                        <th>תאריך רישום</th>
                        <th>שם הסטודנט</th>
                        <th>תעודת זהות</th>
                        <th>אחים רשומים</th>
                        <th class="text-center">פעולות</th>
                    </tr>
                </thead>
                <tbody id="resultsTable">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBsWV2a4D_jLkT8CDkhuiMIF-iUeAdoxmE",
        authDomain: "registration-system-36ec5.firebaseapp.com",
        projectId: "registration-system-36ec5",
        storageBucket: "registration-system-36ec5.firebasestorage.app",
        messagingSenderId: "417197352828",
        appId: "1:417197352828:web:173fc91810f9efc38226f9",
        databaseURL: "https://registration-system-36ec5-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ניהול מצב התחברות
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadData();
        } else {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
        }
    });

    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        
        auth.signInWithEmailAndPassword(email, pass).catch(err => {
            errorDiv.innerText = "אופס! הפרטים לא נכונים.";
        });
    }

    function logout() { auth.signOut(); }

    function loadData() {
        db.ref('registrations').on('value', snap => {
            const tableBody = document.getElementById('resultsTable');
            tableBody.innerHTML = '';
            const data = snap.val();
            
            if (data) {
                Object.keys(data).forEach(key => {
                    const entry = data[key];
                    let siblingsHtml = '';
                    
                    if (entry.siblings && Array.isArray(entry.siblings)) {
                        entry.siblings.forEach(s => {
                            siblingsHtml += `<span class="sibling-tag">${s.name}</span>`;
                        });
                    }

                    tableBody.innerHTML += `
                        <tr>
                            <td class="text-muted small">${entry.submissionTime || ''}</td>
                            <td><strong>${entry.studentName}</strong></td>
                            <td>${entry.studentID}</td>
                            <td>${siblingsHtml || '<span class="text-muted">אין אחים</span>'}</td>
                            <td class="text-center">
                                <button class="btn btn-outline-danger btn-sm" onclick="deleteEntry('${key}')">מחיקה</button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center p-4">אין נתונים במערכת</td></tr>';
            }
        });
    }

    function deleteEntry(key) {
        if (confirm('בטוח שרוצה למחוק את הרישום?')) {
            db.ref('registrations/' + key).remove();
        }
    }
</script>

</body>
</html>
