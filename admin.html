<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ניהול מאובטח - מעיין שמחה</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-light">

<div id="loginSection" class="container mt-5" style="max-width: 400px;">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-4">כניסת מנהל</h3>
        <input type="email" id="email" class="form-control mb-2" placeholder="אימייל">
        <input type="password" id="password" class="form-control mb-3" placeholder="סיסמה">
        <button onclick="login()" class="btn btn-primary w-100">התחבר לצפייה בנתונים</button>
        <div id="loginError" class="text-danger mt-2 text-center"></div>
    </div>
</div>

<div id="adminContent" class="container-fluid mt-4" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>רשימת נרשמים מאובטחת</h2>
        <button onclick="logout()" class="btn btn-outline-danger">התנתק</button>
    </div>
    <div class="table-responsive bg-white p-3 rounded shadow-sm">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr><th>תאריך</th><th>שם</th><th>ת"ז</th><th>אחים</th><th>פעולות</th></tr>
            </thead>
            <tbody id="resultsTable"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBsWV2a4D_jLkT8CDkhuiMIF-iUeAdoxmE",
        authDomain: "registration-system-36ec5.firebaseapp.com",
        projectId: "registration-system-36ec5",
        storageBucket: "registration-system-36ec5.firebasestorage.app",
        messagingSenderId: "417197352828",
        appId: "1:417197352828:web:173fc91810f9efc38226f9",
        databaseURL: "https://registration-system-36ec5-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // בדיקה אם המשתמש כבר מחובר
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadData();
        } else {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminContent').style.display = 'none';
        }
    });

    function login() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => {
            document.getElementById('loginError').innerText = "פרטים שגויים";
        });
    }

    function logout() { auth.signOut(); }

    function loadData() {
        db.ref('registrations').on('value', snap => {
            const table = document.getElementById('resultsTable');
            table.innerHTML = '';
            const data = snap.val();
            if(data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    table.innerHTML += `<tr>
                        <td>${item.submissionTime || ''}</td>
                        <td>${item.studentName}</td>
                        <td>${item.studentID}</td>
                        <td>${(item.siblings || []).map(s => s.name).join(', ')}</td>
                        <td><button class="btn btn-sm btn-danger" onclick="deleteItem('${key}')">מחק</button></td>
                    </tr>`;
                });
            }
        });
    }

    function deleteItem(key) {
        if(confirm('למחוק?')) db.ref('registrations/'+key).remove();
    }
</script>
</body>
</html>
