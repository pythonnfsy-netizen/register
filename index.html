<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת רישום - מעיין שמחה</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: system-ui, -apple-system, sans-serif; }
        .registration-card { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .sibling-row { background: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; border-radius: 12px; margin-bottom: 15px; position: relative; }
        .brand-header { color: #c71585; font-weight: bold; margin-bottom: 30px; text-align: center; }
        .btn-brand { background-color: #c71585; color: white; border: none; padding: 12px; font-size: 1.1rem; }
        .btn-brand:hover { background-color: #a0116b; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="registration-card">
        <h2 class="brand-header">טופס רישום תלמידים</h2>
        
        <form id="studentForm">
            <h5 class="mb-3">פרטי הסטודנט</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">שם מלא</label>
                    <input type="text" id="mainName" class="form-control" required placeholder="ישראל ישראלי">
                </div>
                <div class="col-md-6">
                    <label class="form-label">תעודת זהות</label>
                    <input type="text" id="mainID" class="form-control" required placeholder="000000000">
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">אחים לרישום במערכת</h5>
                <button type="button" class="btn btn-outline-primary btn-sm" onclick="addNewSibling()">+ הוסף אח</button>
            </div>
            
            <div id="siblingsList">
                </div>

            <hr class="my-4">
            <button type="submit" class="btn btn-brand w-100 shadow-sm">שלח רישום לשרת</button>
        </form>
        
        <div id="feedback" class="mt-4 text-center" style="display:none;"></div>
    </div>
</div>

<script>
    // הנתונים מהצילום מסך שלך
    const firebaseConfig = {
        apiKey: "AIzaSyBsWV2a4D_jLkT8CDkhuiMIF-iUeAdoxmE",
        authDomain: "registration-system-36ec5.firebaseapp.com",
        projectId: "registration-system-36ec5",
        storageBucket: "registration-system-36ec5.firebasestorage.app",
        messagingSenderId: "417197352828",
        appId: "1:417197352828:web:173fc91810f9efc38226f9",
        databaseURL: "https://registration-system-36ec5-default-rtdb.europe-west1.firebasedatabase.app/" 
    };

    // אתחול Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // פונקציה להוספת שורת אח חדשה
    function addNewSibling() {
        const list = document.getElementById('siblingsList');
        const div = document.createElement('div');
        div.className = 'sibling-row animate__animated animate__fadeIn';
        div.innerHTML = `
            <div class="row g-2">
                <div class="col-md-6">
                    <input type="text" class="form-control sib-name" placeholder="שם האח" required>
                </div>
                <div class="col-md-4">
                    <input type="text" class="form-control sib-id" placeholder="ת.ז אח" required>
                </div>
                <div class="col-md-2 text-end">
                    <button type="button" class="btn btn-outline-danger w-100" onclick="this.parentElement.parentElement.parentElement.remove()">מחק</button>
                </div>
            </div>
        `;
        list.appendChild(div);
    }

    // טיפול בשליחת הטופס
    document.getElementById('studentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const feedback = document.getElementById('feedback');
        feedback.style.display = 'block';
        feedback.className = 'mt-4 text-center text-primary';
        feedback.innerText = 'שולח נתונים...';

        // איסוף נתוני אחים
        const siblingsData = [];
        document.querySelectorAll('.sibling-row').forEach(row => {
            siblingsData.push({
                name: row.querySelector('.sib-name').value,
                id: row.querySelector('.sib-id').value
            });
        });

        // יצירת האובייקט המלא
        const finalData = {
            studentName: document.getElementById('mainName').value,
            studentID: document.getElementById('mainID').value,
            siblings: siblingsData,
            submissionTime: new Date().toLocaleString('he-IL')
        };

        // שמירה ל-Firebase Realtime Database
        const newRef = database.ref('registrations').push();
        newRef.set(finalData)
            .then(() => {
                feedback.className = 'mt-4 text-center text-success fw-bold';
                feedback.innerText = 'הרישום בוצע בהצלחה! הנתונים נשמרו ב-Firebase.';
                document.getElementById('studentForm').reset();
                document.getElementById('siblingsList').innerHTML = '';
            })
            .catch(error => {
                feedback.className = 'mt-4 text-center text-danger';
                feedback.innerText = 'שגיאה בשמירה: ' + error.message;
            });
    });
</script>

</body>
</html>
