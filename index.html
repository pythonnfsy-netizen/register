<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת רישום - מעיין שמחה</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .brand-color { color: #c71585; }
        .btn-submit { background-color: #c71585; color: white; border: none; }
        .btn-submit:hover { background-color: #a0116b; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <div class="text-center mb-4">
            <img src="https://www.msy.org.il/images/dddhre-min.jpg" style="width: 120px;">
            <h2 class="brand-color mt-3">טופס רישום ראשוני</h2>
            <p class="text-muted">אנא מלאו את הפרטים הבסיסיים כדי להתחיל</p>
        </div>

        <form id="registrationForm">
            <div class="mb-3">
                <label class="form-label">שם מלא</label>
                <input type="text" id="fullName" class="form-control" required placeholder="ישראל ישראלי">
            </div>
            <div class="mb-3">
                <label class="form-label">תעודת זהות</label>
                <input type="text" id="idNumber" class="form-control" required placeholder="000000000">
            </div>
            <div class="mb-3">
                <label class="form-label">מספר טלפון</label>
                <input type="tel" id="phone" class="form-control" required placeholder="050-0000000">
            </div>
            <div class="mb-3">
                <label class="form-label">מספר אחים לרישום</label>
                <input type="number" id="siblings" class="form-control" value="0" min="0">
            </div>
            
            <button type="submit" class="btn btn-submit w-100 py-2">שמירה והמשך</button>
        </form>
        
        <div id="statusMessage" class="mt-3 text-center" style="display:none;"></div>
    </div>
</div>

<script>
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const status = document.getElementById('statusMessage');
        status.style.display = 'block';
        status.className = 'mt-3 text-center text-primary';
        status.innerText = 'שומר נתונים...';

        // כאן בעתיד נחבר את ה-API של Firebase או ה-Apps Script שלך
        const formData = {
            name: document.getElementById('fullName').value,
            id: document.getElementById('idNumber').value,
            phone: document.getElementById('phone').value,
            siblings: document.getElementById('siblings').value
        };

        console.log("נתונים שנאספו:", formData);
        
        // סימולציה של הצלחה
        setTimeout(() => {
            status.className = 'mt-3 text-center text-success';
            status.innerText = 'הנתונים נשמרו בהצלחה!';
        }, 1500);
    });
</script>

</body>
</html>
